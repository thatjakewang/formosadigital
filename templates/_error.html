{# Shared error page body — used by 404.html and 500.html (set code + message) #}
{% extends 'base.html' %}

{% block robots %}<meta name="robots" content="noindex">{% endblock %}
{% block title %}{{ code }} - {{ message }}{% endblock %}

{% block content %}
<section class="intro error-page">
    <h1>{{ code }}</h1>
    <p class="subtitle">{{ message }}</p>
    <p class="error-back">
        <a href="{{ url_for('pages.home') }}">← 回到首頁</a>
    </p>
</section>
{% endblock %}
