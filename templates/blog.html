{% extends 'base.html' %}

{% block content %}
<section class="intro">
    <h1>部落格</h1>
    <p class="subtitle">所有文章。</p>
</section>

{% if tags %}
<nav class="post-tags tag-index" aria-label="Browse by tag">
    {% for tag in tags %}
    <a href="{{ url_for('pages.tag_page', tag_slug=tag|slugify_tag) }}" class="tag-chip">{{ tag }}</a>
    {% endfor %}
</nav>
{% endif %}

<section class="post-list">
    {% include '_post_list.html' %}
</section>
{% endblock %}
